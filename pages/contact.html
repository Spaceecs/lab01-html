<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Зворотній зв'язок з валідацією JavaScript та збереженням чернеток."
    />
    <title>Контакти | Форма зв'язку</title>
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/responsive.css" />
    <script src="../js/ui.js" defer></script>
    <script src="../js/contact.js" defer></script>
    <script src="../js/main.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-container">
        <span class="logo">Web-Проект</span>
        <div class="header-controls">
          <button
            class="theme-toggle"
            id="theme-btn"
            aria-label="Перемикач теми"
          >
            Mісяць/Сонце
          </button>
          <button
            class="menu-toggle"
            aria-expanded="false"
            aria-label="Головне меню"
          >
            ☰
          </button>
        </div>
        <nav class="main-nav">
          <a href="../index.html" class="nav-link">Головна</a>
          <a href="about.html" class="nav-link">Про мене</a>
          <a href="contact.html" class="nav-link">Контакти</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="card form-section">
        <h1>Зв'яжіться зі мною</h1>

        <div id="form-success-block" class="success-message" hidden>
          <h3>Дані успішно оброблено локально!</h3>
          <div id="submitted-data-output"></div>
        </div>

        <form
          action="#"
          method="get"
          class="styled-form"
          id="contact-form"
          novalidate
        >
          <h2>Форма зворотного зв'язку</h2>

          <div class="form-group">
            <label for="name">Ім’я (обов’язково):</label>
            <input
              id="name"
              name="name"
              type="text"
              placeholder="Ваше ім'я"
              required
            />
            <span class="error-text" id="name-error"></span>
          </div>

          <div class="form-group">
            <label for="email">Email (обов’язково):</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="example@email.com"
              required
            />
            <span class="error-text" id="email-error"></span>
          </div>

          <div class="form-group">
            <label for="phone">Телефон:</label>
            <input
              id="phone"
              name="phone"
              type="tel"
              placeholder="+380XXXXXXXXX"
            />
            <span class="error-text" id="phone-error"></span>
          </div>

          <div class="form-group">
            <label for="topic">Тема звернення:</label>
            <select id="topic" name="topic">
              <option value="study">Навчання / Практика</option>
              <option value="work">Пропозиція роботи</option>
              <option value="other">Інше</option>
            </select>
          </div>

          <fieldset class="form-fieldset">
            <legend>Зручний спосіб зв’язку</legend>
            <label class="radio-checkbox-label">
              <input type="radio" name="contactWay" value="email" checked />
              Email
            </label>
            <label class="radio-checkbox-label">
              <input type="radio" name="contactWay" value="phone" /> Телефон
            </label>
          </fieldset>

          <div class="form-group">
            <div class="textarea-header">
              <label for="message">Повідомлення:</label>
              <span id="char-counter" class="counter">0 / 200</span>
            </div>
            <textarea
              id="message"
              name="message"
              rows="5"
              placeholder="Текст вашого повідомлення тут..."
              required
            ></textarea>
            <span class="error-text" id="message-error"></span>
          </div>

          <div class="form-group checkbox-group">
            <label class="radio-checkbox-label">
              <input type="checkbox" name="agree" required />
              Я даю згоду на обробку персональних даних.
            </label>
            <span class="error-text" id="agree-error"></span>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Надіслати</button>
            <button type="reset" class="btn btn-reset">Очистити</button>
          </div>
        </form>
      </section>
    </main>

    <button class="back-to-top" id="back-btn" hidden>↑ Вгору</button>

    <footer class="site-footer">
      <div class="container">
        <p>
          &copy; <span id="current-year"></span> Студент Інженерії ПЗ. Усі права
          захищено.
        </p>
      </div>
    </footer>
  </body>
</html>
